name: CI Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - '**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Prettier Check
        run: npm run format:check

      - name: Run Tests
        id: test_step
        run: npm run test -- --reporter=junit --outputFile=test-results.xml

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always() && steps.test_step.outcome != 'skipped'
        with:
          name: Vitest Tests
          path: test-results.xml
          reporter: java-junit
          fail-on-error: true
